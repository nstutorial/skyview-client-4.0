<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Routine Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 1000px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }
    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .period-item {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .period-item input {
      flex: 1;
    }
    .btn-custom {
      background: #667eea;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn-custom:hover {
      background: #764ba2;
      color: white;
    }
    .btn-danger-custom {
      background: #dc3545;
    }
    .btn-danger-custom:hover {
      background: #c82333;
    }
    .btn-success-custom {
      background: #28a745;
    }
    .btn-success-custom:hover {
      background: #218838;
    }
    .alert-box {
      padding: 15px;
      border-radius: 5px;
      margin-top: 10px;
      display: none;
    }
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .alert-box.show {
      display: block;
    }
    select, input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }
    .table-container {
      margin-top: 20px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #667eea;
      color: white;
      font-weight: bold;
    }
    tr:hover {
      background: #f5f5f5;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1><i class="fas fa-calendar-alt"></i> Class Routine Manager</h1>
    <p>Manage and view class schedules</p>
  </div>

  <!-- Save Routine Section -->
  <div class="section">
    <h2><i class="fas fa-save"></i> Save New Routine</h2>
    
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="classInput">Class Name:</label>
        <input type="text" id="classInput" placeholder="e.g., Nursery-A" class="form-control">
      </div>
      <div class="col-md-4">
        <label for="daySelect">Day:</label>
        <select id="daySelect" class="form-control">
          <option value="">Select Day</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>
    </div>

    <div id="periodsContainer"></div>

    <button class="btn btn-custom" onclick="addPeriod()">
      <i class="fas fa-plus"></i> Add Period
    </button>
    <button class="btn btn-success-custom" id="saveBtn" onclick="saveRoutine()">
      <i class="fas fa-save"></i> Save Routine
    </button>

    <div id="saveAlert" class="alert-box"></div>
  </div>

  <!-- Fetch Routine Section -->
  <div class="section">
    <h2><i class="fas fa-search"></i> View Routine</h2>
    
    <div class="row mb-3">
      <div class="col-md-4">
        <label for="fetchDaySelect">Select Day:</label>
        <select id="fetchDaySelect" class="form-control">
          <option value="">Select Day</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
        </select>
      </div>
    </div>

    <button class="btn btn-custom" id="fetchRoutineBtn" onclick="fetchRoutine()">
      <i class="fas fa-search"></i> Fetch Routine
    </button>

    <div id="fetchAlert" class="alert-box"></div>
    <div id="routineTableContainer" class="table-container"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script>
  // FIXED: Proper token retrieval using CONFIG storage keys
  function getAuthToken() {
    const token = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
    if (!token) {
      console.error('No authentication token found');
      showAlert('fetchAlert', 'Authentication required. Please login first.', 'error');
      setTimeout(() => {
        window.location.href = 'pages/login.html';
      }, 2000);
      return null;
    }
    return token;
  }

  function showAlert(elementId, message, type) {
    const alertBox = document.getElementById(elementId);
    alertBox.textContent = message;
    alertBox.className = `alert-box show alert-${type}`;
    setTimeout(() => {
      alertBox.classList.remove('show');
    }, 5000);
  }

  function addPeriod() {
    const container = document.getElementById('periodsContainer');
    const periodCount = container.children.length + 1;
    
    const periodItem = document.createElement('div');
    periodItem.className = 'period-item';
    periodItem.innerHTML = `
      <label style="min-width: 100px;">Period ${periodCount}</label>
      <input type="text" placeholder="Period Name" class="period-name">
      <input type="time" placeholder="Start Time" class="period-time">
      <input type="text" placeholder="Subject" class="period-subject">
      <input type="text" placeholder="Teacher" class="period-teacher">
      <button type="button" class="btn btn-danger-custom" onclick="this.parentElement.remove()">
        <i class="fas fa-trash"></i>
      </button>
    `;
    container.appendChild(periodItem);
  }

  async function saveRoutine() {
    const classInput = document.getElementById('classInput');
    const daySelect = document.getElementById('daySelect');
    const periodsContainer = document.getElementById('periodsContainer');
    const saveAlert = document.getElementById('saveAlert');

    // Validation
    if (!classInput.value.trim()) {
      showAlert('saveAlert', 'Please enter a class name.', 'error');
      return;
    }

    if (!daySelect.value) {
      showAlert('saveAlert', 'Please select a day.', 'error');
      return;
    }

    if (periodsContainer.children.length === 0) {
      showAlert('saveAlert', 'Please add at least one period.', 'error');
      return;
    }

    // Collect periods data
    const periods = [];
    periodsContainer.querySelectorAll('.period-item').forEach(item => {
      const period = {
        name: item.querySelector('.period-name').value,
        time: item.querySelector('.period-time').value,
        subject: item.querySelector('.period-subject').value,
        teacher: item.querySelector('.period-teacher').value
      };
      periods.push(period);
    });

    // Get token
    const token = getAuthToken();
    if (!token) return;

    try {
      console.log('Sending Routine:', {
        class: classInput.value,
        day: daySelect.value,
        periods: periods
      });

      // FIXED: Correct authentication header with Bearer token
      const response = await fetch(
        `${CONFIG.API_URL}/routines/save-routine`,
        {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` // FIXED: Proper Bearer token format
          },
          body: JSON.stringify({
            class: classInput.value,
            day: daySelect.value,
            periods: periods
          })
        }
      );

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();
      console.log('Routine saved:', data);

      showAlert('saveAlert', '✓ Routine saved successfully!', 'success');

      // Clear form
      classInput.value = '';
      daySelect.value = '';
      periodsContainer.innerHTML = '';

      setTimeout(() => {
        addPeriod(); // Add empty period
      }, 500);

    } catch (error) {
      console.error('Error saving routine:', error);
      showAlert('saveAlert', `✗ Error saving routine: ${error.message}`, 'error');
    }
  }

  async function fetchRoutine() {
    const day = document.getElementById('fetchDaySelect').value;
    const container = document.getElementById('routineTableContainer');
    const fetchAlert = document.getElementById('fetchAlert');

    container.innerHTML = '';

    if (!day) {
      showAlert('fetchAlert', 'Please select a day.', 'error');
      return;
    }

    // Get token
    const token = getAuthToken();
    if (!token) return;

    try {
      console.log('Fetching routine for day:', day);

      // FIXED: Correct authentication header with Bearer token
      const response = await fetch(
        `${CONFIG.API_URL}/routines/get-routine?day=${encodeURIComponent(day)}`,
        {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` // FIXED: Proper Bearer token format
          }
        }
      );

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const data = await response.json();
      console.log('Fetched routine data:', data);

      // FIXED: Correct response parsing - data.routines contains the array
      if (!data.routines || data.routines.length === 0) {
        container.innerHTML = `
          <div class="alert alert-info">
            <i class="fas fa-info-circle"></i> No routine found for <strong>${day}</strong>.
          </div>
        `;
        return;
      }

      const routines = data.routines;

      let tableHTML = `
        <h3>Routines for ${day}</h3>
        <table>
          <thead>
            <tr>
              <th>Class</th>
              <th>Day</th>
              <th>Periods</th>
            </tr>
          </thead>
          <tbody>
      `;

      routines.forEach(routine => {
        let periodsDisplay = '';
        
        if (Array.isArray(routine.periods)) {
          periodsDisplay = routine.periods
            .map(p => {
              if (typeof p === 'object' && p.name) {
                return `${p.name} (${p.time || 'N/A'}) - ${p.subject || 'N/A'} by ${p.teacher || 'N/A'}`;
              }
              return JSON.stringify(p);
            })
            .join('<br>');
        } else if (typeof routine.periods === 'object' && routine.periods !== null) {
          periodsDisplay = JSON.stringify(routine.periods);
        } else {
          periodsDisplay = routine.periods || 'N/A';
        }

        tableHTML += `
          <tr>
            <td><strong>${routine.class}</strong></td>
            <td>${routine.day}</td>
            <td>${periodsDisplay}</td>
          </tr>
        `;
      });

      tableHTML += `
          </tbody>
        </table>
      `;

      container.innerHTML = tableHTML;
      showAlert('fetchAlert', `✓ Found ${routines.length} routine(s) for ${day}`, 'success');

    } catch (error) {
      console.error('Error fetching routine:', error);
      showAlert('fetchAlert', `✗ Error fetching routine: ${error.message}`, 'error');
    }
  }

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', () => {
    // Check authentication
    const token = localStorage.getItem(CONFIG.STORAGE_KEYS.TOKEN);
    if (!token) {
      document.body.innerHTML = `
        <div class="container" style="text-align: center; margin-top: 50px;">
          <h2>Authentication Required</h2>
          <p>Please log in first to access this page.</p>
          <button class="btn btn-custom" onclick="window.location.href='pages/login.html'">
            <i class="fas fa-sign-in-alt"></i> Go to Login
          </button>
        </div>
      `;
      return;
    }

    // Add initial empty period
    addPeriod();
  });
</script>

</body>
</html>
