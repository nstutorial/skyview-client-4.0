<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Routine Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background-color: #f2f2f2; }
    select, button, input { padding: 10px; font-size: 16px; margin-right: 10px; }
    .error { color: red; margin-top: 10px; }
    .success { color: green; margin-top: 10px; }
  </style>
</head>
<body>

  <h2>View Class Routine</h2>

  <label for="daySelect">Day:</label>
  <select id="daySelect">
    <option value="Monday">Monday</option>
    <option value="Tuesday">Tuesday</option>
    <option value="Wednesday">Wednesday</option>
    <option value="Thursday">Thursday</option>
    <option value="Friday">Friday</option>
    <option value="Saturday">Saturday</option>
  </select>

  <button onclick="fetchRoutine()">Fetch Routine</button>

  <div id="routineTableContainer"></div>

  <script>
    async function fetchRoutine() {
      const day = document.getElementById("daySelect").value;
      const container = document.getElementById("routineTableContainer");
      container.innerHTML = ""; // clear previous

      if (!day) {
        container.innerHTML = `<p class="error">Please select a day.</p>`;
        return;
      }

      try {
        // Get authentication token from localStorage
        const token = localStorage.getItem('skyview_token');
        if (!token) {
          container.innerHTML = `<p class="error">Authentication required. Please login first.</p>`;
          window.location.href = 'pages/login.html';
          return;
        }

        // CORRECTED: Fixed endpoint URL
        const response = await fetch(
          `https://skyview-server-4-0.vercel.app/api/routines/get-routine?day=${encodeURIComponent(day)}`,
          {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          }
        );

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();

        // CORRECTED: Fixed response parsing - data.routines contains the array
        if (!data.routines || data.routines.length === 0) {
          container.innerHTML = `<p class="error">No routine found for <strong>${day}</strong>.</p>`;
          return;
        }

        const routines = data.routines;

        let table = `<h3>Routines for ${day}</h3>`;
        table += `<table>
          <thead>
            <tr>
              <th>Class</th>
              <th>Day</th>
              <th>Periods</th>
            </tr>
          </thead>
          <tbody>`;

        routines.forEach(routine => {
          // periods could be an array or string, handle both cases
          let periodsDisplay = '';
          if (Array.isArray(routine.periods)) {
            periodsDisplay = routine.periods
              .map(p => typeof p === 'object' ? JSON.stringify(p) : p)
              .join(', ');
          } else if (typeof routine.periods === 'object') {
            periodsDisplay = JSON.stringify(routine.periods);
          } else {
            periodsDisplay = routine.periods || 'N/A';
          }

          table += `<tr>
            <td><strong>${routine.class}</strong></td>
            <td>${routine.day}</td>
            <td>${periodsDisplay}</td>
          </tr>`;
        });

        table += `</tbody></table>`;
        container.innerHTML = table;

      } catch (error) {
        console.error('Error fetching routines:', error);
        container.innerHTML = `<p class="error">Error fetching routine: ${error.message}</p>`;
      }
    }

    // Load default (Monday) routine on page load
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('daySelect').value = 'Monday';
      // Uncomment to auto-fetch on load:
      // fetchRoutine();
    });
  </script>
</body>
</html>
